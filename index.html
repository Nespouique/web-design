<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<title>Pokédex</title>
	<!-- Material Design fonts -->
	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700" type="text/css">
	<!-- Bootstrap Material Design -->
	<link href="css/bootstrap.css" rel="stylesheet">

	<!-- Angular.js -->
	<script type="text/javascript" src="js/angular.js"></script>
	<script type="text/javascript" src="js/angular-route.js"></script>
	<script type="text/javascript" src="js/app.js"></script>
	<!--Custom contents-->
	<link href="css/pokemon.css" rel="stylesheet">
	<!--Fin des imports pour l'index-->
</head>

<body class="welcome-page">
	<div class="main-title">
		<h1>Pokédex Kanto</h1>
		<!--Lien vers le Pokedex-->
		<a href="pokedex.html#/liste">Entrer</a>
		<button id="play-theme-button" type="button" class="theme-button">Ecouter le générique</button>
	</div>
	<div>
		<!--Ajout de la musique de générique pour que l'utilisateur retrouve l'ambiance des dessins animés-->
		<audio id="theme-audio" class="display-audio" controls autoplay loop preload="auto">
			<source src="data/le_meilleur_dresseur.mp3" type="audio/mp3">
		</audio>
	</div>

	<script>
		(function () {
			var audio = document.getElementById('theme-audio');
			var playButton = document.getElementById('play-theme-button');
			if (!audio) return;

			function tryPlay() {
				var promise = audio.play();
				if (promise && typeof promise.catch === 'function') {
					promise.catch(function () {
						// L'autoplay peut être bloqué tant qu'il n'y a pas d'interaction utilisateur.
					});
				}
			}

			tryPlay();

			function playOnFirstInteraction() {
				tryPlay();
			}

			if (playButton) {
				playButton.addEventListener('click', function (event) {
					event.preventDefault();
					tryPlay();
				});
			}

			document.addEventListener('click', playOnFirstInteraction, { once: true });
			document.addEventListener('touchstart', playOnFirstInteraction, { once: true });
			document.addEventListener('keydown', playOnFirstInteraction, { once: true });
		})();
	</script>
</body>
</html>
