<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<title>Pokédex</title>
	<!-- Material Design fonts -->
	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700" type="text/css">
	<!-- Bootstrap Material Design -->
	<link href="css/bootstrap.css" rel="stylesheet">

	<!-- Angular.js -->
	<script type="text/javascript" src="js/angular.js"></script>
	<script type="text/javascript" src="js/angular-route.js"></script>
	<script type="text/javascript" src="js/app.js"></script>
	<!--Custom contents-->
	<link href="css/pokemon.css" rel="stylesheet">
	<!--Fin des imports pour l'index-->
</head>

<body class="welcome-page">
	<div class="main-title">
		<h1>Pokédex Kanto</h1>
		<!--Lien vers le Pokedex-->
		<a href="pokedex.html#/liste">Entrer</a>
		<button id="play-theme-button" type="button" class="theme-button" aria-label="Écouter le générique">
			<svg class="theme-button-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
				<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
				<path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
				<path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
			</svg>
			<span>Écouter le générique</span>
		</button>
	</div>
	<div>
		<!--Ajout de la musique de générique pour que l'utilisateur retrouve l'ambiance des dessins animés-->
		<audio id="theme-audio" class="display-audio" loop preload="auto">
			<source src="data/le_meilleur_dresseur.mp3" type="audio/mp3">
		</audio>
	</div>

	<script>
		(function () {
			var audio = document.getElementById('theme-audio');
			var playButton = document.getElementById('play-theme-button');
			if (!audio || !playButton) return;

			playButton.addEventListener('click', function (event) {
				event.preventDefault();
				audio.play();
			});
		})();
	</script>
</body>
</html>
